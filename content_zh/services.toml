content = "导演创作并搬演了一部原创校园音乐剧，以书信与文学为线索，讲述了交织着青春、爱情与自我发现的故事。作品探讨了孤独、身份认同与情感成长等主题，为校园生活提供了一种诗意的表达。负责全流程创作，包括剧本编写、演员选拔和舞台导演。"

